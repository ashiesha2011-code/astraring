<!DOCTYPE html>
<html lang="en">
<head>
    <title>Zenith Space: AstraRing 14 Operations</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        #ui { position: absolute; top: 20px; left: 20px; color: #00d2ff; pointer-events: none; }
        #sector-info { position: absolute; bottom: 20px; right: 20px; background: rgba(0,0,0,0.8); color: white; padding: 20px; border: 1px solid #00d2ff; width: 300px; display: none; }
        .hud-label { font-size: 12px; text-transform: uppercase; letter-spacing: 2px; }
        h1 { margin: 0; color: #fff; text-shadow: 0 0 10px #00d2ff; }
    </style>
</head>
<body>

<div id="ui">
    <h1>ASTRARING 14</h1>
    <div class="hud-label">Zenith Space Command Nexus</div>
    <p>Radius: 14km | Nexus: 21m | Gravity: 0.9G</p>
    <p>Status: All Sectors Operational</p>
    <p><i>Click a sector to engage Street-View Link</i></p>
</div>

<div id="sector-info">
    <h2 id="sector-name">Sector View</h2>
    <p id="sector-desc"></p>
    <div id="live-feed" style="width:100%; height:150px; background:#111; border: 1px solid #333; display:flex; align-items:center; justify-content:center; color:#555;">
        [LIVE NEURAL FEED ACTIVE]
    </div>
</div>

<script type="importmap">
    { "imports": { "three": "https://unpkg.com" } }
</script>

<script type="module">
    import * as THREE from 'three';

    // --- PHYSICS CONSTANTS ---
    const R = 14000; // 14km Primary
    const r_nexus = 21; // 21m Hub
    const RPM = 0.24; // ~0.9G for 14km
    const sectorData = [
        { name: "Aurelius", desc: "Administrative Hub. Home to the Zenith Council. Zero-Partiality AI active." },
        { name: "Veridian", desc: "Agricultural Sector. 70% humidity. Vertical forests scrubbing atmospheric CO2." },
        { name: "Forge-7", desc: "Industrial Core. Closed-loop 3D printing. Zero-Pollution manufacturing engaged." },
        { name: "Aetheris", desc: "Research/Science. Advanced R&D. Hyper-fast data uplink to Earth." },
        { name: "Novus", desc: "Logistics & Trade. Interplanetary docking active. Resource distribution online." }
    ];

    // --- SCENE SETUP ---
    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 1, 100000);
    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    document.body.appendChild(renderer.domElement);

    // --- LIGHTING (The Nexus Mirror Array) ---
    const ambientLight = new THREE.AmbientLight(0x404040, 0.5);
    scene.add(ambientLight);
    const sunLight = new THREE.DirectionalLight(0xffffff, 2);
    sunLight.position.set(5000, 2000, 5000);
    scene.add(sunLight);

    // --- THE RING (14km Cylinder) ---
    const ringGeom = new THREE.CylinderGeometry(R, R, 3000, 64, 1, true);
    const ringMat = new THREE.MeshPhongMaterial({ color: 0x222222, side: THREE.DoubleSide });
    const ring = new THREE.Mesh(ringGeom, ringMat);
    ring.rotation.x = Math.PI / 2;
    scene.add(ring);

    // Interior Land Simulation (The Curved Floor)
    const landGeom = new THREE.CylinderGeometry(R - 50, R - 50, 2800, 64, 1, true);
    const landMat = new THREE.MeshPhongMaterial({ color: 0x114411, wireframe: true });
    const land = new THREE.Mesh(landGeom, landMat);
    ring.add(land);

    // --- THE ZENITH NEXUS (21m Hub) ---
    const nexusGeom = new THREE.SphereGeometry(200, 32, 32);
    const nexusMat = new THREE.MeshPhongMaterial({ color: 0x00d2ff, emissive: 0x005588 });
    const nexus = new THREE.Mesh(nexusGeom, nexusMat);
    scene.add(nexus);

    // --- BRIDGES (The 5 Spokes) ---
    const bridgeGroup = new THREE.Group();
    for (let i = 0; i < 5; i++) {
        const bridgeGeom = new THREE.BoxGeometry(100, R, 100);
        const bridgeMat = new THREE.MeshPhongMaterial({ color: 0x444444 });
        const bridge = new THREE.Mesh(bridgeGeom, bridgeMat);
        const angle = (i * Math.PI * 2) / 5;
        bridge.position.set(Math.cos(angle) * (R/2), Math.sin(angle) * (R/2), 0);
        bridge.rotation.z = angle + Math.PI/2;
        bridgeGroup.add(bridge);
    }
    scene.add(bridgeGroup);

    // --- STABILIZATION RINGS (Counter-Rotating) ---
    const stabRingGeom = new THREE.TorusGeometry(R + 500, 50, 16, 100);
    const stabRingMat = new THREE.MeshBasicMaterial({ color: 0x333333 });
    const stabRing1 = new THREE.Mesh(stabRingGeom, stabRingMat);
    const stabRing2 = new THREE.Mesh(stabRingGeom, stabRingMat);
    stabRing1.position.z = 1000;
    stabRing2.position.z = -1000;
    scene.add(stabRing1);
    scene.add(stabRing2);

    camera.position.set(0, 5000, 25000);
    camera.lookAt(0, 0, 0);

    // --- INTERACTION ---
    const raycaster = new THREE.Raycaster();
    const mouse = new THREE.Vector2();

    window.addEventListener('click', (event) => {
        mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
        mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;
        raycaster.setFromCamera(mouse, camera);
        
        const sectorIndex = Math.floor(Math.random() * 5); // Simulated sector selection
        document.getElementById('sector-info').style.display = 'block';
        document.getElementById('sector-name').innerText = sectorData[sectorIndex].name + " Sector";
        document.getElementById('sector-desc').innerText = sectorData[sectorIndex].desc;
    });

    // --- ANIMATION LOOP (Physics) ---
    function animate() {
        requestAnimationFrame(animate);
        
        const rotationStep = 0.002;
        
        // 1. Torque & Rotation of Primary Ring
        ring.rotation.y += rotationStep; 
        bridgeGroup.rotation.z += rotationStep;
        
        // 2. Counter-Rotation for Stability
        stabRing1.rotation.z -= rotationStep * 2.5;
        stabRing2.rotation.z -= rotationStep * 2.5;
        
        // 3. Nexus Spinning for 0.9G
        nexus.rotation.y += rotationStep * 10;
        
        renderer.render(scene, camera);
    }
    animate();
</script>
</body>
</html>
